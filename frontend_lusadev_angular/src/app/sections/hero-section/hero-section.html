<div class="hero-copy">
  <div class="hero-first-view" *ngIf="mode() === 'title'">
    <div class="title-motion-wrap">
      <h1 class="headline">{{ copy().title }}</h1>
    </div>
  </div>

  <div class="hero-second-view" *ngIf="mode() === 'overview'">
    <div class="about-layout">
      <figure class="about-logo-panel">
        <img src="assets/logo/LogoConLetras.png" [alt]="imageAlt() || copy().kicker" />
      </figure>

      <div class="about-copy">
        <h2>{{ copy().overviewTitle }}</h2>
        <p class="description">{{ copy().description }}</p>

        <div class="cta-row">
          <a class="btn btn-primary" href="mailto:lusaworks@icloud.com">{{ copy().primaryCta }}</a>
          <a class="btn btn-secondary" href="#specialization">{{ copy().secondaryCta }}</a>
        </div>
      </div>
    </div>

    <dl class="metrics">
      <div class="metric" *ngFor="let metric of copy().metrics">
        <dt>{{ metric.value }}</dt>
        <dd>{{ metric.label }}</dd>
      </div>
    </dl>
  </div>
</div>
