<div class="contact-shell">

  <div class="section-illustration" aria-hidden="true">
    <svg viewBox="0 0 180 78" role="presentation">
      <rect x="16" y="16" width="148" height="46" rx="10" />
      <path d="M24 24L90 52L156 24" />
      <circle cx="148" cy="22" r="9" />

  <a class="contact-cta" href="mailto:rpas_app@icloud.com">{{ copy().ctaLabel }}</a>
  <p class="response-note">{{ copy().responseNote }}</p>
