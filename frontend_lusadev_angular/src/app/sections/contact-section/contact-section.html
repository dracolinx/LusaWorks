<div class="contact-shell">
  <p class="eyebrow">{{ copy().eyebrow }}</p>
  <div class="section-illustration" aria-hidden="true">
    <svg viewBox="0 0 200 130" role="presentation" preserveAspectRatio="xMidYMid meet">
      <rect x="20" y="22" width="160" height="86" rx="12" />
      <path d="M28 30L100 78L172 30" />
      <path d="M28 100L82 58" />
      <path d="M172 100L118 58" />
    </svg>
  </div>
  <h2>{{ copy().title }}</h2>
  <p class="description">{{ copy().description }}</p>

  <a class="contact-cta" href="mailto:lusaworks@icloud.com">{{ copy().ctaLabel }}</a>
  <p class="response-note">{{ copy().responseNote }}</p>
</div>
