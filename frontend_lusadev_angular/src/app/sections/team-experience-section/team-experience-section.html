<header class="section-header">
  <p class="eyebrow">{{ copy().eyebrow }}</p>
  <h2>{{ copy().title }}</h2>
  <p>{{ copy().intro }}</p>
</header>

<section class="skills-group">
  <p class="group-title">{{ copy().pillarsHeading }}</p>
  <div class="skills-grid">
    <article class="skill-card" *ngFor="let pillar of copy().pillars; let i = index">
      <div class="skill-head">
        <span class="skill-icon" [ngSwitch]="i % 4" aria-hidden="true">
          <svg *ngSwitchCase="0" viewBox="0 0 24 24" role="presentation">
            <path d="M8 6H4V10" />
            <path d="M16 6H20V10" />
            <path d="M8 18H4V14" />
            <path d="M16 18H20V14" />
            <path d="M9 9H15V15H9z" />
          </svg>
          <svg *ngSwitchCase="1" viewBox="0 0 24 24" role="presentation">
            <path d="M4 7H20" />
            <path d="M4 12H20" />
            <path d="M4 17H14" />
          </svg>
          <svg *ngSwitchCase="2" viewBox="0 0 24 24" role="presentation">
            <circle cx="8" cy="8" r="2.4" />
            <circle cx="16" cy="8" r="2.4" />
            <circle cx="12" cy="16" r="2.4" />
            <path d="M10 9.5L11.3 14.4M14 9.5L12.7 14.4" />
          </svg>
          <svg *ngSwitchDefault viewBox="0 0 24 24" role="presentation">
            <path d="M4 12H9L11 6L14 18L16 12H20" />
          </svg>
        </span>
        <div class="foldable-copy">
          <h3>{{ pillar }}</h3>
          <button
            type="button"
            class="fold-toggle"
            (click)="togglePillar(i)"
            [attr.aria-expanded]="isPillarExpanded(i)"
            [attr.aria-controls]="'pillar-detail-' + i"
          >
            {{ foldLabel(isPillarExpanded(i)) }}
          </button>
        </div>
      </div>
      <div class="fold-content" [class.open]="isPillarExpanded(i)" [attr.id]="'pillar-detail-' + i">
        <p class="detail-text">{{ pillarDetail(i) }}</p>
      </div>
      <div class="skill-meter" role="presentation">
        <span [style.width.%]="pillarLevel(i)"></span>
      </div>
    </article>
  </div>
</section>

<section class="skills-group timeline-group">
  <p class="group-title">{{ copy().timelineHeading }}</p>
  <div class="skills-grid timeline-grid">
    <article class="skill-card timeline-card" *ngFor="let item of copy().timeline; let i = index">
      <div class="skill-head">
        <span class="skill-icon" [ngSwitch]="(i + 1) % 4" aria-hidden="true">
          <svg *ngSwitchCase="0" viewBox="0 0 24 24" role="presentation">
            <path d="M8 6H4V10" />
            <path d="M16 6H20V10" />
            <path d="M8 18H4V14" />
            <path d="M16 18H20V14" />
            <path d="M9 9H15V15H9z" />
          </svg>
          <svg *ngSwitchCase="1" viewBox="0 0 24 24" role="presentation">
            <path d="M4 7H20" />
            <path d="M4 12H20" />
            <path d="M4 17H14" />
          </svg>
          <svg *ngSwitchCase="2" viewBox="0 0 24 24" role="presentation">
            <circle cx="8" cy="8" r="2.4" />
            <circle cx="16" cy="8" r="2.4" />
            <circle cx="12" cy="16" r="2.4" />
            <path d="M10 9.5L11.3 14.4M14 9.5L12.7 14.4" />
          </svg>
          <svg *ngSwitchDefault viewBox="0 0 24 24" role="presentation">
            <path d="M4 12H9L11 6L14 18L16 12H20" />
          </svg>
        </span>
        <div class="timeline-copy">
          <h4>{{ item.title }}</h4>
          <p class="period">{{ item.period }}</p>
          <button
            type="button"
            class="fold-toggle"
            (click)="toggleTimeline(i)"
            [attr.aria-expanded]="isTimelineExpanded(i)"
            [attr.aria-controls]="'timeline-detail-' + i"
          >
            {{ foldLabel(isTimelineExpanded(i)) }}
          </button>
          <div class="fold-content timeline-fold" [class.open]="isTimelineExpanded(i)" [attr.id]="'timeline-detail-' + i">
            <p class="description">{{ item.description }}</p>
          </div>
        </div>
      </div>
      <div class="skill-meter" role="presentation">
        <span [style.width.%]="timelineLevel(i)"></span>
      </div>
    </article>
  </div>
</section>
