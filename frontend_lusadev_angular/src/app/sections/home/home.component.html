<section id="hero" class="section hero-stage hero-stage-title" appRevealOnScroll>
  <div class="hero-blob hero-blob-a"></div>
  <div class="hero-blob hero-blob-b"></div>
  <div class="hero-blob hero-blob-c"></div>
  <div class="hero-layout">
    <app-hero-section [copy]="copy().hero" [mode]="'title'"></app-hero-section>
  </div>
  <div class="hero-scroll-cue" aria-hidden="true">
    <span class="cue-line"></span>
  </div>
</section>

<section id="hero-overview" class="section hero-overview-stage" appRevealOnScroll>
  <div class="hero-overview-layout">
    <app-hero-section
      [copy]="copy().hero"
      [imageAlt]="copy().heroImageAlt"
      [mode]="'overview'"
    ></app-hero-section>
  </div>
</section>

<section id="specialization" class="section" appRevealOnScroll>
  <div class="section-container">
    <app-specialization-section [copy]="copy().specialization"></app-specialization-section>
  </div>
</section>

<section id="servicios-jaen" class="section section-service-links" appRevealOnScroll>
  <div class="section-container">
    <div class="seo-service-links">
      <div class="seo-service-copy">
        <p class="seo-service-eyebrow">Servicios en Jaén</p>
        <h2>Software a medida, automatización e IA para empresas de Jaén</h2>
        <p>
          Desarrollo técnico orientado a procesos reales: plataformas internas, bots, automatización
          documental, gestión UAS e IA local con revisión profesional.
        </p>
      </div>

      <div class="seo-service-grid" aria-label="Servicios tecnológicos de LusaWorks en Jaén">
        <a
          class="seo-service-card"
          *ngFor="let page of servicePages"
          [routerLink]="['/', page.slug]"
        >
          <span>{{ page.primaryKeyword }}</span>
          <strong>{{ page.title }}</strong>
          <small>{{ page.summary }}</small>
        </a>
      </div>
    </div>
  </div>
</section>

<section id="method" class="section" appRevealOnScroll>
  <div class="section-container">
    <app-method-section [copy]="copy().method"></app-method-section>
  </div>
</section>

<section id="team" class="section" appRevealOnScroll>
  <div class="section-container">
    <app-team-experience-section [copy]="copy().team"></app-team-experience-section>
  </div>
</section>

<section id="proximity" class="section" appRevealOnScroll>
  <div class="section-container">
    <app-proximity-section [copy]="copy().proximity"></app-proximity-section>
  </div>
</section>

<section id="contact" class="section section-contact" appRevealOnScroll>
  <div class="section-container">
    <app-contact-section [copy]="copy().contact"></app-contact-section>
  </div>
</section>

<section id="legal-policy" class="section section-legal" appRevealOnScroll>
  <div class="section-container">
    <app-legal-policy-section [copy]="copy().legalPolicy"></app-legal-policy-section>
    <div class="legal-followup legal-compact">
      <app-legal-footer [copy]="copy().legal"></app-legal-footer>
    </div>
  </div>
</section>
