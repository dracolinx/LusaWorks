<div class="site-background"></div>
<div class="bg-orb orb-left"></div>
<div class="bg-orb orb-right"></div>

<div class="page-shell">
  <header class="site-header">
    <a class="brand" href="#hero" (click)="closeMobileMenu()">
      <img src="assets/logo/lusadev-logo.jpeg" [alt]="copy().logoAlt" />
      <div class="brand-copy">
        <strong>LusaWorks</strong>
      </div>
    </a>

    <nav class="desktop-nav">
      <a
        *ngFor="let link of copy().nav; trackBy: trackNavLink"
        [href]="'#' + link.id"
        (click)="closeMobileMenu()"
      >
        {{ link.label }}
      </a>
    </nav>

    <div class="header-actions">
      <div class="language-switch" [attr.aria-label]="copy().languageLabel">
        <button type="button" [class.active]="isLanguageActive('es')" (click)="setLanguage('es')">ES</button>
        <button type="button" [class.active]="isLanguageActive('en')" (click)="setLanguage('en')">EN</button>
      </div>

      <button
        type="button"
        class="menu-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-label]="mobileMenuOpen() ? copy().closeMenuLabel : copy().mobileMenuLabel"
      >
        {{ mobileMenuOpen() ? copy().closeMenuText : copy().mobileMenuText }}
      </button>
    </div>
  </header>

  <nav class="mobile-nav" [class.open]="mobileMenuOpen()">
    <a
      *ngFor="let link of copy().nav; trackBy: trackNavLink"
      [href]="'#' + link.id"
      (click)="closeMobileMenu()"
    >
      {{ link.label }}
    </a>
  </nav>

  <main class="site-main">
    <section id="hero" class="section hero-stage" appRevealOnScroll>
      <div class="hero-layout">
        <app-hero-section [copy]="copy().hero"></app-hero-section>

        <div class="hero-visual hero-illustration" aria-hidden="true">
          <svg viewBox="0 0 640 420" role="presentation">
            <defs>
              <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0f2b3f" />
                <stop offset="100%" stop-color="#06111c" />
              </linearGradient>
              <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#6da3c7" />
                <stop offset="100%" stop-color="#e39d5d" />
              </linearGradient>
            </defs>
            <rect x="18" y="18" width="604" height="384" rx="28" fill="url(#panel)" />
            <rect x="84" y="88" width="170" height="110" rx="14" fill="#15344b" stroke="#3f7392" />
            <rect x="286" y="74" width="266" height="144" rx="16" fill="#0c2334" stroke="#4d86a8" />
            <rect x="84" y="234" width="468" height="98" rx="14" fill="#0a1e2e" stroke="#416f8d" />
            <path d="M254 145H286M552 145H610M319 218V234M436 218V234M168 198V234" stroke="url(#line)" stroke-width="6" stroke-linecap="round" />
            <circle cx="254" cy="145" r="10" fill="#e39d5d" />
            <circle cx="286" cy="145" r="10" fill="#6da3c7" />
            <circle cx="319" cy="234" r="10" fill="#e39d5d" />
            <circle cx="436" cy="234" r="10" fill="#6da3c7" />
            <circle cx="168" cy="234" r="10" fill="#e39d5d" />
            <path d="M114 282H522M114 314H404" stroke="#5d8ca9" stroke-width="8" stroke-linecap="round" />
            <rect x="320" y="108" width="198" height="74" rx="10" fill="#13344b" />
            <path d="M346 145H494" stroke="#86b7d3" stroke-width="8" stroke-linecap="round" />
          </svg>
          <p class="hero-visual-caption">{{ copy().hero.kicker }}</p>
        </div>
      </div>
    </section>

    <section id="specialization" class="section" appRevealOnScroll>
      <app-specialization-section [copy]="copy().specialization"></app-specialization-section>
    </section>

    <section id="team" class="section" appRevealOnScroll>
      <app-team-experience-section [copy]="copy().team"></app-team-experience-section>
    </section>

    <section id="proximity" class="section" appRevealOnScroll>
      <app-proximity-section [copy]="copy().proximity"></app-proximity-section>
    </section>

    <section id="contact" class="section section-contact" appRevealOnScroll>
      <app-contact-section [copy]="copy().contact"></app-contact-section>
    </section>
  </main>

  <footer id="legal" class="site-footer legal-compact" appRevealOnScroll>
    <app-legal-footer [copy]="copy().legal"></app-legal-footer>
  </footer>
</div>
