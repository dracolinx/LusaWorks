<div class="site-background"></div>
<div class="bg-orb orb-left"></div>
<div class="bg-orb orb-right"></div>

<div class="custom-cursor" *ngIf="customCursorEnabled()" [style.transform]="cursorTransform()">
  <span class="cursor-ring"></span>
  <span class="cursor-dot"></span>
</div>

<div class="page-shell">
  <header class="site-header" [class.scrolled]="headerScrolled()">
    <div class="header-inner">
      <a class="brand" href="#hero" (click)="closeMobileMenu()">
        <img class="brand-logo" src="assets/logo/LogoConLetras.png" [alt]="copy().logoAlt" />
        <div class="brand-copy">
          <strong>LusaWorks</strong>
        </div>
      </a>

      <nav class="desktop-nav">
        <a
          *ngFor="let link of copy().nav; trackBy: trackNavLink"
          [href]="'#' + link.id"
          (click)="closeMobileMenu()"
        >
          {{ link.label }}
        </a>
      </nav>

      <div class="header-actions">
        <a class="header-cta" href="#contact" (click)="closeMobileMenu()">
          {{ headerCtaLabel() }}
        </a>

        <div class="language-switch" [attr.aria-label]="copy().languageLabel">
          <button type="button" [class.active]="isLanguageActive('es')" (click)="setLanguage('es')">ES</button>
          <button type="button" [class.active]="isLanguageActive('en')" (click)="setLanguage('en')">EN</button>
        </div>

        <button
          type="button"
          class="menu-toggle"
          (click)="toggleMobileMenu()"
          [attr.aria-label]="mobileMenuOpen() ? copy().closeMenuLabel : copy().mobileMenuLabel"
        >
          {{ mobileMenuOpen() ? copy().closeMenuText : copy().mobileMenuText }}
        </button>
      </div>
    </div>
  </header>

  <nav class="mobile-nav" [class.open]="mobileMenuOpen()">
    <a
      *ngFor="let link of copy().nav; trackBy: trackNavLink"
      [href]="'#' + link.id"
      (click)="closeMobileMenu()"
    >
      {{ link.label }}
    </a>
  </nav>

  <main class="site-main">
    <section id="hero" class="section hero-stage hero-stage-title" appRevealOnScroll>
      <div class="hero-blob hero-blob-a"></div>
      <div class="hero-blob hero-blob-b"></div>
      <div class="hero-blob hero-blob-c"></div>
      <div class="hero-layout">
        <app-hero-section [copy]="copy().hero" [mode]="'title'"></app-hero-section>
      </div>
      <div class="hero-scroll-cue" aria-hidden="true">
        <span class="cue-line"></span>
      </div>
    </section>

    <section id="hero-overview" class="section hero-overview-stage" appRevealOnScroll>
      <div class="hero-overview-layout">
        <app-hero-section [copy]="copy().hero" [imageAlt]="copy().heroImageAlt" [mode]="'overview'"></app-hero-section>
      </div>
    </section>

    <section id="specialization" class="section" appRevealOnScroll>
      <div class="section-container">
        <app-specialization-section [copy]="copy().specialization"></app-specialization-section>
      </div>
    </section>

    <section id="method" class="section" appRevealOnScroll>
      <div class="section-container">
        <app-method-section [copy]="copy().method"></app-method-section>
      </div>
    </section>

    <section id="team" class="section" appRevealOnScroll>
      <div class="section-container">
        <app-team-experience-section [copy]="copy().team"></app-team-experience-section>
      </div>
    </section>

    <section id="proximity" class="section" appRevealOnScroll>
      <div class="section-container">
        <app-proximity-section [copy]="copy().proximity"></app-proximity-section>
      </div>
    </section>

    <section id="contact" class="section section-contact" appRevealOnScroll>
      <div class="section-container">
        <app-contact-section [copy]="copy().contact"></app-contact-section>
      </div>
    </section>

    <section id="legal-policy" class="section" appRevealOnScroll>
      <div class="section-container">
        <app-legal-policy-section [copy]="copy().legalPolicy"></app-legal-policy-section>
      </div>
    </section>
  </main>

  <footer id="legal" class="site-footer legal-compact" appRevealOnScroll>
    <div class="section-container">
      <app-legal-footer [copy]="copy().legal"></app-legal-footer>
    </div>
  </footer>
</div>
