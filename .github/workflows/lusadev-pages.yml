name: Deploy LusaWorks Landing
# Trigger file for GitHub Pages workflow (retry)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend_lusadev_angular/**'
      - '.github/workflows/lusadev-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend_lusadev_angular/package-lock.json

      - name: Install dependencies
        working-directory: frontend_lusadev_angular
        run: npm ci

      - name: Build Angular app for GitHub Pages
        working-directory: frontend_lusadev_angular
        run: npm run build:pages

      - name: Prepare pages artifact
        shell: bash
        run: |
          mkdir -p .deploy/lusadev
          cp -r frontend_lusadev_angular/dist/frontend_lusadev_angular/browser/* .deploy/lusadev/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
